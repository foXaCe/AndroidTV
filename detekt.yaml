build:
  # Baseline: 314 existing issues in legacy code.
  # Reduce this number over time — any increase will fail the build.
  maxIssues: 314

comments:
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false

complexity:
  CyclomaticComplexMethod:
    threshold: 30
  LongMethod:
    threshold: 150
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInInterfaces: 15
    thresholdInClasses: 30
  LargeClass:
    active: false
  ComplexCondition:
    threshold: 5
  NestedBlockDepth:
    threshold: 5

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false
  SwallowedException:
    active: false
  InstanceOfCheckForException:
    active: false

naming:
  InvalidPackageDeclaration:
    active: false
  FunctionNaming:
    ignoreAnnotated:
      - Composable
  MatchingDeclarationName:
    active: false

performance:
  SpreadOperator:
    active: false
  ForEachOnRange:
    active: false

style:
  ForbiddenComment:
    comments: [ 'STOPSHIP:' ]
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  ReturnCount:
    max: 6
  MaxLineLength:
    maxLineLength: 140
  UseRequireNotNull:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  MayBeConst:
    active: false
